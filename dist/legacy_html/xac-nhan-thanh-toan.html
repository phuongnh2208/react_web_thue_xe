<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Xác Nhận Thanh Toán - Kinetic Concierge</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&family=Inter:wght@400;500;600&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" />
  <style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
  </style>
</head>
<body class="bg-slate-50 text-slate-900 font-['Inter'] min-h-screen">
  <main class="max-w-3xl mx-auto px-6 py-16">
    <section class="bg-white rounded-2xl shadow-xl shadow-blue-900/10 border border-slate-200 p-8 md:p-12">
      <div class="w-16 h-16 rounded-full bg-blue-100 text-blue-900 flex items-center justify-center mb-6">
        <span class="material-symbols-outlined text-3xl" style="font-variation-settings: 'FILL' 1;">verified</span>
      </div>

      <h1 class="font-['Plus_Jakarta_Sans'] text-3xl md:text-4xl font-extrabold text-blue-950 tracking-tight mb-3">Xác nhận thanh toán thành công</h1>
      <p class="text-slate-600 mb-8">Khoản thanh toán của bạn đã được ghi nhận. Vui lòng tiếp tục để xem hợp đồng điện tử và thông tin chữ ký.</p>

      <div class="rounded-xl bg-slate-50 border border-slate-200 p-5 space-y-3 mb-8">
        <div class="flex justify-between text-sm">
          <span class="text-slate-500">Thời gian thuê</span>
          <span class="font-semibold text-slate-900" id="confirm-days">--</span>
        </div>
        <div class="flex justify-between text-sm">
          <span class="text-slate-500">Tạm tính</span>
          <span class="font-semibold text-slate-900" id="confirm-subtotal">--</span>
        </div>
        <div class="flex justify-between text-sm">
          <span class="text-slate-500">Bảo hiểm</span>
          <span class="font-semibold text-slate-900" id="confirm-insurance">--</span>
        </div>
        <div class="h-px bg-slate-200"></div>
        <div class="flex justify-between">
          <span class="font-bold text-blue-950">Tổng thanh toán</span>
          <span class="font-black text-blue-950 text-xl" id="confirm-total">--</span>
        </div>
      </div>

      <div class="flex flex-col sm:flex-row gap-3">
        <a href="trang-chu-khach-hang.html" class="px-5 py-3 rounded-xl border border-slate-300 text-slate-700 font-semibold text-center">Về trang chủ</a>
        <button id="view-contract-btn" type="button" class="px-5 py-3 rounded-xl bg-blue-900 text-white font-bold hover:bg-blue-800 transition-colors">Tiếp tục đến hợp đồng</button>
      </div>
    </section>
  </main>

  <script>
    (function () {
      const formatVnd = (amount) => `${new Intl.NumberFormat('vi-VN').format(amount)} VNĐ`;
      const query = new URLSearchParams(window.location.search);

      const days = Number(query.get('days')) || 0;
      const subtotal = Number(query.get('subtotal')) || 0;
      const insurance = Number(query.get('insurance')) || 0;
      const total = Number(query.get('total')) || subtotal + insurance;

      const setText = (id, value) => {
        const el = document.getElementById(id);
        if (el) el.textContent = value;
      };

      setText('confirm-days', days > 0 ? `${days} ngày` : '--');
      setText('confirm-subtotal', formatVnd(subtotal));
      setText('confirm-insurance', formatVnd(insurance));
      setText('confirm-total', formatVnd(total));

      const nextQuery = new URLSearchParams({
        pickup: query.get('pickup') || '',
        dropoff: query.get('dropoff') || '',
        rate: query.get('rate') || '',
        days: String(days),
        subtotal: String(subtotal),
        insurance: String(insurance),
        total: String(total)
      }).toString();

      const viewContractBtn = document.getElementById('view-contract-btn');
      if (viewContractBtn) {
        viewContractBtn.addEventListener('click', function () {
          window.location.href = `thanh-cong-hop-dong-dien-tu.html?${nextQuery}`;
        });
      }
    })();
  </script>
</body>
</html>
